<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>Video Tour</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+Thai:wght@300;400;500;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --gold:#f2c46b;
  --gold-light:#ffe5b1;
  --bg:#09060d;
  --wine:#2a1020;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Noto Sans Thai',sans-serif;
}

body{
  background:
    radial-gradient(circle at top,
      rgba(242,196,107,.12),
      transparent 35%),

    radial-gradient(circle at bottom,
      rgba(201,31,61,.10),
      transparent 38%),

    linear-gradient(180deg,
      #1b0b18 0%,
      #09060d 100%);
}

#videoShell{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#videoGlow{
  position:absolute;
  inset:-20%;

  background:
    radial-gradient(circle,
      rgba(242,196,107,.16),
      transparent 42%);

  filter:blur(60px);
  animation:glowPulse 8s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{
    transform:scale(1);
    opacity:.8;
  }

  50%{
    transform:scale(1.06);
    opacity:1;
  }
}

#videoFrameWrap{
  position:relative;
  width:min(96vw,1700px);
  aspect-ratio:16/9;

  border-radius:32px;
  overflow:hidden;

  border:1px solid rgba(242,196,107,.28);

  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 40px 100px rgba(0,0,0,.65),
    0 0 80px rgba(242,196,107,.12);

  background:#000;

  z-index:5;

  transform:scale(.96);
  animation:videoEnter 1s ease forwards;
}

@keyframes videoEnter{
  to{
    transform:scale(1);
  }
}

#videoFrameWrap::before{
  content:'';

  position:absolute;
  inset:0;

  border-radius:32px;

  pointer-events:none;

  background:
    linear-gradient(180deg,
      rgba(255,255,255,.05),
      transparent 20%,
      transparent 80%,
      rgba(255,255,255,.04));

  z-index:2;
}

#youtubeFrame{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  border:none;
}

#topOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:
    max(18px,env(safe-area-inset-top))
    22px
    0;

  z-index:20;

  pointer-events:none;
}

#tourTitle{
  padding:12px 18px;

  border-radius:999px;

  background:rgba(10,6,14,.42);

  border:1px solid rgba(242,196,107,.18);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

  box-shadow:
    0 0 30px rgba(242,196,107,.08);

  pointer-events:auto;
}

#tourTitleSmall{
  font-size:10px;
  letter-spacing:3px;
  color:rgba(242,196,107,.65);
  margin-bottom:3px;
  font-family:'Cinzel',serif;
}

#tourTitleMain{
  color:#fff4e3;
  font-family:'Noto Serif Thai',serif;
  font-size:16px;
  font-weight:700;
}

#backBtn{
  pointer-events:auto;

  display:flex;
  align-items:center;
  gap:10px;

  padding:13px 22px;

  border:none;
  border-radius:999px;

  cursor:pointer;

  color:#fff3dc;
  font-size:14px;
  font-weight:700;

  background:
    linear-gradient(135deg,
      rgba(242,196,107,.16),
      rgba(120,40,20,.18));

  border:1px solid rgba(242,196,107,.34);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.35),
    0 0 30px rgba(242,196,107,.10);

  transition:
    transform .2s ease,
    box-shadow .2s ease,
    background .2s ease;
}

#backBtn:hover{
  transform:translateY(-2px) scale(1.03);

  background:
    linear-gradient(135deg,
      rgba(242,196,107,.24),
      rgba(120,40,20,.24));

  box-shadow:
    0 14px 38px rgba(0,0,0,.45),
    0 0 40px rgba(242,196,107,.18);
}

#backBtn:active{
  transform:scale(.96);
}

#backBtnIcon{
  font-size:16px;
}

#bottomHint{
  position:fixed;
  bottom:max(18px,env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);

  padding:10px 18px;

  border-radius:999px;

  color:rgba(255,244,227,.72);
  font-size:12px;

  background:rgba(0,0,0,.32);

  border:1px solid rgba(255,255,255,.06);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  z-index:15;
}

@media (max-width:900px){

  #videoFrameWrap{
    width:100vw;
    height:100vh;
    aspect-ratio:auto;
    border-radius:0;
  }

  #videoFrameWrap::before{
    border-radius:0;
  }

  #topOverlay{
    padding-top:max(14px,env(safe-area-inset-top));
    padding-left:14px;
    padding-right:14px;
    gap:10px;
  }

  #tourTitle{
    padding:10px 14px;
  }

  #tourTitleMain{
    font-size:14px;
  }

  #backBtn{
    padding:12px 16px;
    font-size:13px;
  }

  #bottomHint{
    width:calc(100% - 30px);
    text-align:center;
    font-size:11px;
  }
}

</style>
</head>

<body>

<div id="videoShell">

  <div id="videoGlow"></div>

  <div id="videoFrameWrap">

    <iframe
      id="youtubeFrame"
      src="https://www.youtube.com/embed/SoLHheU1CQ8?autoplay=1&rel=0&modestbranding=1"

      allow="
        autoplay;
        fullscreen;
        picture-in-picture"

      allowfullscreen>
    </iframe>

  </div>

</div>

<div id="topOverlay">

  <div id="tourTitle">

    <div id="tourTitleSmall">
      VIDEO EXPERIENCE
    </div>

    <div id="tourTitleMain">
      Video Tour · ศาลเจ้าปึงเถ่ากงม่าขอนแก่น
    </div>

  </div>

  <button id="backBtn"
          onclick="goBack()">

    <span id="backBtnIcon">←</span>
    <span>กลับสู่ Virtual Tour</span>

  </button>

</div>

<div id="bottomHint">
  รับชมแบบ Cinematic Experience พร้อมดนตรีและบรรยากาศเต็มรูปแบบ
</div>

<script>

function goBack(){

  window.location.href =
  "tour.html";

}

</script>

</body>
</html>
