<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0">

<title>Video Tour</title>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

#youtubeFrame{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

#backBtn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:20;

  padding:12px 22px;

  border:none;
  border-radius:30px;

  background:rgba(0,0,0,.45);
  color:#fff;

  font-size:15px;
  cursor:pointer;

  backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<iframe
  id="youtubeFrame"
  src="https://www.youtube.com/embed/SoLHheU1CQ8?autoplay=1&rel=0"
  allow="
    autoplay;
    fullscreen;
    picture-in-picture"
  allowfullscreen>
</iframe>

<button
  id="backBtn"
  onclick="goBack()">

  กลับสู่ Virtual Tour

</button>

<script>

function goBack(){

  window.location.href =
  "tour.html";

}

</script>

</body>
</html>
