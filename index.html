<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศาลเจ้าปึงเถ่ากงม่าขอนแก่น · Virtual Tour</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0500;font-family:"Noto Sans Thai",sans-serif;overflow:hidden;height:100vh}
#map{position:fixed;inset:0;width:100%;height:100%}

/* Additional styles for UI */
#intro-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(10,5,0,0.85);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
.shrine-logo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:2px solid #C8901A;}
.shrine-title{font-family:"Noto Serif Thai",serif;font-size:26px;font-weight:700;color:#E8B84B;text-shadow:0 0 28px #C8901A80;}
.enter-btn{
  background:transparent;color:#E8B84B;
  border:1.5px solid #C8901A;border-radius:50px;
  padding:14px 48px;font-family:"Noto Serif Thai",serif;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:1px;
}
</style>
</head>
<body>

<div id="map"></div>

<!-- Intro overlay -->
<div id="intro-overlay">
  <img class="shrine-logo" src="logo_hiso.png" alt="โลโก้">
  <div class="shrine-title">ศาลเจ้าปึงเถ่ากงม่า ขอนแก่น</div>
  <button class="enter-btn" onclick="startFlyIn()">✦ เริ่มต้นการเดินทาง ✦</button>
</div>

<script>
// Mapbox token (public demo token)
mapboxgl.accessToken = 'pk.eyJ1IjoiamFyb2VudGEiLCJhIjoiY21vMmhiNWJ2MHU0YzJyb24yNG5wbGFwMiJ9.C3TwRwKjHhV7uHqzaSKJnw';

const SHRINE_LNG = 102.840091;
const SHRINE_LAT = 16.419801;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/satellite-streets-v12', // ใช้ Satellite หรือ Terrain
  center: [SHRINE_LNG, SHRINE_LAT],
  zoom: 16,
  pitch: 45, // มุมมอง 3D
  bearing: -30, // การหมุนแผนที่
  antialias: true
});

map.on('load', () => {
  // เพิ่ม 3D Terrain
  map.addLayer({
    id: 'terrain',
    type: 'hillshade',
    source: {
      type: 'raster',
      url: 'mapbox://mapbox.terrain-rgb',
      tileSize: 512,
      maxzoom: 14
    },
    paint: {
      'raster-opacity': 0.8
    }
  });

  // เพิ่มการแสดงผลอาคาร 3D
  map.addLayer({
    id: '3d-buildings',
    source: 'composite',
    'source-layer': 'building',
    filter: ['==', 'extrude', 'true'],
    type: 'fill-extrusion',
    minzoom: 15,
    paint: {
      'fill-extrusion-color': '#3a1a00',
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.7
    }
  });

  // สร้างปุ่มเพื่อเริ่มการเดินทาง
  document.getElementById('intro-overlay').style.opacity = '0';
  setTimeout(() => { document.getElementById('intro-overlay').style.display = 'none'; }, 1200);

  // ทำให้แผนที่เคลื่อนที่อย่างราบรื่น
  setTimeout(() => {
    map.flyTo({
      center: [SHRINE_LNG, SHRINE_LAT],
      zoom: 18.5,
      pitch: 65,
      bearing: 10,
      duration: 3500,
      easing: t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t
    });
  }, 2000);
});
</script>

</body>
</html>
