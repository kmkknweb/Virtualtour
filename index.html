<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Tour · ศาลเจ้าปึงเถ่ากงม่าขอนแก่น</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0500;font-family:"Noto Sans Thai",sans-serif;height:100vh;overflow:hidden}
#panorama{width:100%;height:100vh}
#badge{
  position:fixed;top:16px;left:16px;z-index:100;
  background:rgba(10,5,0,0.80);
  border:1px solid #C8901A55;
  border-radius:14px;padding:10px 16px;
  backdrop-filter:blur(8px);
  pointer-events:none;
}
#badge .title{font-family:"Noto Serif Thai",serif;font-size:14px;font-weight:700;color:#E8B84B;}
#badge .sub{font-size:11px;color:#C9A96E;margin-top:2px;}
#hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(10,5,0,0.70);
  border:1px solid #C8901A40;
  border-radius:20px;padding:8px 20px;
  font-size:12px;color:#C9A96E;
  backdrop-filter:blur(6px);
  pointer-events:none;
  animation:fadeHint 4s ease forwards;
  animation-delay:4s;
}
@keyframes fadeHint{to{opacity:0}}
</style>
</head>
<body>
<div id="panorama"></div>
<div id="badge">
  <div class="title">ศาลเจ้าปึงเถ่ากงม่าขอนแก่น</div>
  <div class="sub">🏮 ลากนิ้วเพื่อเดินสำรวจ 360°</div>
</div>
<div id="hint">ลากซ้ายขวาเพื่อมองรอบทิศทาง · Pinch เพื่อ zoom</div>
<script>
pannellum.viewer('panorama', {
  type: 'cylindrical',
cylindricalAngle: 360,
  panorama: 'tour_360.jpg',
  autoLoad: true,
  autoRotate: -2,
  autoRotateInactivityDelay: 3000,
  compass: true,
  showZoomCtrl: true,
  showFullscreenCtrl: true,
  mouseZoom: true,
  hfov: 100,
  pitch: 0,
  yaw: 0,
  strings: {
    loadButtonLabel: "คลิกเพื่อเริ่มชม Virtual Tour",
    loadingLabel: "กำลังโหลด...",
  }
});
</script>
</body>
</html>
