<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศาลเจ้าปึงเถ่ากงม่าขอนแก่น · Virtual Tour</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0500;font-family:"Noto Sans Thai",sans-serif;overflow:hidden;height:100vh}
#map{position:fixed;inset:0;width:100%;height:100%}

/* overlay เริ่มต้น */
#intro-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(10,5,0,0.85);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
.shrine-logo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:2px solid #C8901A;filter:drop-shadow(0 0 24px #C8901A90);margin-bottom:22px;}
.shrine-title{font-family:"Noto Serif Thai",serif;font-size:26px;font-weight:700;color:#E8B84B;text-shadow:0 0 28px #C8901A80;text-align:center;line-height:1.6;margin-bottom:8px;}
.shrine-sub{font-size:13px;color:#C9A96E;letter-spacing:1px;margin-bottom:32px;}
.divider{display:flex;align-items:center;gap:10px;width:260px;margin-bottom:32px;}
.divider::before,.divider::after{content:"";flex:1;height:1px;}
.divider::before{background:linear-gradient(to right,transparent,#C8901A60);}
.divider::after{background:linear-gradient(to left,transparent,#C8901A60);}
.divider span{color:#C8901A;font-size:14px;}
.enter-btn{
  background:transparent;color:#E8B84B;
  border:1.5px solid #C8901A;border-radius:50px;
  padding:14px 48px;
  font-family:"Noto Serif Thai",serif;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:1px;
  box-shadow:0 0 24px #C8901A40,inset 0 0 16px #C8901A10;
  transition:all 0.2s;
}
.enter-btn:active{transform:scale(0.96);}
.enter-btn:hover{box-shadow:0 0 36px #C8901A60,inset 0 0 20px #C8901A20;}

/* UI หลังบินลงมา */
#tour-ui{
  position:fixed;inset:0;z-index:50;
  pointer-events:none;
  opacity:0;transition:opacity 1s ease;
}
#tour-ui.visible{opacity:1;pointer-events:all;}

/* ชื่อศาลเจ้าบนซ้าย */
#shrine-badge{
  position:absolute;top:24px;left:24px;
  background:rgba(10,5,0,0.78);
  border:1px solid #C8901A55;
  border-radius:16px;padding:12px 18px;
  backdrop-filter:blur(8px);
}
#shrine-badge .badge-title{font-family:"Noto Serif Thai",serif;font-size:16px;font-weight:700;color:#E8B84B;}
#shrine-badge .badge-sub{font-size:11px;color:#C9A96E;margin-top:3px;}

/* ปุ่มเข้าทัวร์ */
#start-tour-btn{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#E8B84B,#C8901A);
  color:#1c0e00;border:none;border-radius:50px;
  padding:16px 52px;font-family:"Noto Serif Thai",serif;
  font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 32px rgba(200,144,26,0.45);
  transition:transform 0.15s ease,box-shadow 0.2s ease;
  white-space:nowrap;
}
#start-tour-btn:active{transform:translateX(-50%) scale(0.97);}
#start-tour-btn:hover{box-shadow:0 12px 40px rgba(200,144,26,0.6);}

/* hint */
#hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#C9A96E;letter-spacing:1px;
  text-align:center;opacity:0.7;
}

/* compass */
#compass{
  position:absolute;top:24px;right:24px;
  width:44px;height:44px;border-radius:50%;
  background:rgba(10,5,0,0.78);border:1px solid #C8901A55;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;backdrop-filter:blur(8px);
}

/* loading */
#loading{
  position:fixed;inset:0;z-index:200;
  background:#0a0500;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  transition:opacity 0.8s ease;
}
.load-ring{width:48px;height:48px;border-radius:50%;border:2px solid #C8901A30;border-top-color:#C8901A;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:#C9A96E;}

/* particles */
#particles{position:fixed;inset:0;z-index:10;pointer-events:none;}
.p{position:absolute;width:2px;height:2px;border-radius:50%;background:#C8901A;opacity:0;animation:float-up var(--dur) ease-in infinite var(--delay);left:var(--x);bottom:0}
@keyframes float-up{0%{opacity:0;transform:translateY(0)}20%{opacity:.4}100%{opacity:0;transform:translateY(-120px)}}
</style>
</head>
<body>

<div id="loading">
  <div class="load-ring"></div>
  <div class="load-text">กำลังโหลดแผนที่...</div>
</div>

<div id="map"></div>
<div id="particles"></div>

<!-- Intro overlay -->
<div id="intro-overlay">
  <img class="shrine-logo" src="logo_hiso.png" alt="โลโก้" onerror="this.style.display='none'">
  <div class="shrine-title">ศาลเจ้าปึงเถ่ากงม่า<br>ขอนแก่น</div>
  <div class="shrine-sub">สมาคมปึงเถ่ากงม่าขอนแก่น</div>
  <div class="divider"><span>❖</span></div>
  <button class="enter-btn" onclick="startFlyIn()">✦ เริ่มต้นการเดินทาง ✦</button>
</div>

<!-- Tour UI -->
<div id="tour-ui">
  <div id="shrine-badge">
    <div class="badge-title">ศาลเจ้าปึงเถ่ากงม่าขอนแก่น</div>
    <div class="badge-sub">ขอนแก่น · ประเทศไทย</div>
  </div>
  <div id="compass">🧭</div>
  <button id="start-tour-btn" onclick="enterTour()">🏮 เข้าชมศาลเจ้า Virtual Tour</button>
  <div id="hint">ลากแผนที่เพื่อสำรวจพื้นที่โดยรอบ</div>
</div>

<script>
// Mapbox token (public demo token)
mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw';

const SHRINE_LNG = 102.840091;
const SHRINE_LAT = 16.419801;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/satellite-streets-v12',
  center: [SHRINE_LNG, SHRINE_LAT],
  zoom: 2,
  pitch: 0,
  bearing: 0,
  antialias: true
});

map.on('load', () => {
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 800);

  // เพิ่ม 3D buildings
  map.addLayer({
    id: '3d-buildings',
    source: 'composite',
    'source-layer': 'building',
    filter: ['==', 'extrude', 'true'],
    type: 'fill-extrusion',
    minzoom: 15,
    paint: {
      'fill-extrusion-color': '#3a1a00',
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.7
    }
  });
});

function startFlyIn() {
  // ซ่อน overlay
  const overlay = document.getElementById('intro-overlay');
  overlay.style.opacity = '0';
  setTimeout(() => { overlay.style.display = 'none'; }, 1200);

  // เริ่ม fly animation — จากมุมสูงลงมา
  setTimeout(() => {
    map.flyTo({
      center: [SHRINE_LNG, SHRINE_LAT],
      zoom: 6,
      pitch: 0,
      bearing: 0,
      duration: 2000,
      easing: t => t
    });
  }, 400);

  setTimeout(() => {
    map.flyTo({
      center: [SHRINE_LNG, SHRINE_LAT],
      zoom: 13,
      pitch: 45,
      bearing: -20,
      duration: 3000,
      easing: t => t * (2 - t)
    });
  }, 2600);

  setTimeout(() => {
    map.flyTo({
      center: [SHRINE_LNG, SHRINE_LAT],
      zoom: 18.5,
      pitch: 65,
      bearing: 10,
      duration: 3500,
      easing: t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t
    });
  }, 6000);

  // แสดง tour UI หลังบินลงมาครบ
  setTimeout(() => {
    const ui = document.getElementById('tour-ui');
    ui.classList.add('visible');

    // เพิ่ม marker ที่ศาลเจ้า
    const el = document.createElement('div');
    el.innerHTML = '🏮';
    el.style.cssText = 'font-size:32px;cursor:pointer;filter:drop-shadow(0 0 8px #C8901A);animation:pulse-marker 2s ease-in-out infinite;';
    document.head.insertAdjacentHTML('beforeend', '<style>@keyframes pulse-marker{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}</style>');
    new mapboxgl.Marker(el).setLngLat([SHRINE_LNG, SHRINE_LAT]).addTo(map);
  }, 10000);
}

function enterTour() {
  alert('🏮 เชื่อมต่อไปยัง Virtual Tour 360° ที่นี่ครับ\n\n(จะ link ไปยังหน้า tour จริงเมื่อถ่ายภาพ 360° เสร็จแล้ว)');
}

// Particles
const pc = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'p';
  p.style.setProperty('--x', Math.random()*100+'%');
  p.style.setProperty('--dur', (5+Math.random()*6)+'s');
  p.style.setProperty('--delay', (Math.random()*8)+'s');
  pc.appendChild(p);
}
</script>
</body>
</html>
