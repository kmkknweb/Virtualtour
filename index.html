<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#080300;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; gap:20px;
}
#log {
  color:#fff; font-size:14px; text-align:center;
  background:rgba(255,255,255,0.1);
  padding:16px; border-radius:8px; width:80%;
  min-height:60px;
}
.btn {
  padding:20px 50px;
  background:#C8901A; color:#000;
  font-size:18px; font-weight:700;
  border:none; border-radius:8px;
  cursor:pointer;
  touch-action:manipulation;
}
</style>
</head>
<body>
<div id="log">กดปุ่มด้านล่างครับ</div>
<button class="btn" id="btn">กดทดสอบ</button>
<script>
const log = document.getElementById('log');
const btn = document.getElementById('btn');
btn.addEventListener('click', () => {
  log.textContent = 'Click ทำงานได้!';
  log.style.color = '#4CAF50';
});
btn.addEventListener('touchend', (e) => {
  e.preventDefault();
  log.textContent = 'touchend ทำงานได้!';
  log.style.color = '#4CAF50';
});
</script>
</body>
</html>
