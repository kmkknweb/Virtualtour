<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศาลเจ้าปึงเถ่ากงม่าขอนแก่น · Virtual Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;700&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a0500;font-family:"Noto Sans Thai",sans-serif}

/* ===== SCREENS ===== */
.screen{position:fixed;inset:0;z-index:10;transition:opacity 0.8s ease}
.screen.hidden{opacity:0;pointer-events:none}

/* ===== SPLASH ===== */
#splash{
  background:#1a0900;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px;
}
#splash canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.spl-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,#5a1e0038,transparent 70%);pointer-events:none}
.spl-logo-wrap{position:relative;width:160px;height:160px;margin-bottom:20px}
.spl-glow1{position:absolute;inset:-22px;border-radius:50%;background:radial-gradient(circle,#C8901A28,transparent 65%);animation:breathe 2.5s ease-in-out infinite}
.spl-glow2{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,#C8901A42,transparent 60%);animation:breathe 2.5s ease-in-out infinite 0.7s}
.spl-logo{width:160px;height:160px;border-radius:50%;object-fit:cover;background:transparent;position:relative;z-index:1;filter:drop-shadow(0 0 24px #C8901A95)}
.spl-title{font-family:"Noto Serif Thai",serif;font-size:24px;font-weight:700;color:#E8B84B;text-shadow:0 0 28px #C8901A80;text-align:center;line-height:1.6;position:relative;z-index:2;margin-bottom:6px}
.spl-sub{font-size:12px;color:#C9A96E;letter-spacing:1px;position:relative;z-index:2;margin-bottom:28px}
.spl-divider{display:flex;align-items:center;gap:10px;width:240px;margin-bottom:28px;position:relative;z-index:2}
.spl-divider::before{content:"";flex:1;height:1px;background:linear-gradient(to right,transparent,#C8901A60)}
.spl-divider::after{content:"";flex:1;height:1px;background:linear-gradient(to left,transparent,#C8901A60)}
.spl-divider span{color:#C8901A;font-size:14px}
.spl-btn{position:relative;z-index:2;background:transparent;color:#E8B84B;border:1.5px solid #C8901A;border-radius:50px;padding:14px 48px;font-family:"Noto Serif Thai",serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 0 20px #C8901A40,inset 0 0 16px #C8901A10;transition:all 0.2s;white-space:nowrap}
.spl-btn:active{transform:scale(0.96)}

/* ===== MAP (fly-in) ===== */
#map-screen{z-index:8}
#map{position:absolute;inset:0;width:100%;height:100%}

/* badge บนแผนที่ */
#map-badge{
  position:absolute;top:20px;left:20px;z-index:20;
  background:rgba(10,5,0,0.82);border:1px solid #C8901A55;
  border-radius:14px;padding:10px 16px;backdrop-filter:blur(8px);
  opacity:0;transition:opacity 0.8s ease;
}
#map-badge.show{opacity:1}
#map-badge .mb-title{font-family:"Noto Serif Thai",serif;font-size:14px;font-weight:700;color:#E8B84B}
#map-badge .mb-sub{font-size:11px;color:#C9A96E;margin-top:2px}

/* ปุ่มเข้าทัวร์ */
#enter-tour-btn{
  position:absolute;bottom:56px;left:50%;transform:translateX(-50%);z-index:20;
  background:linear-gradient(135deg,#E8B84B,#C8901A);
  color:#1c0e00;border:none;border-radius:50px;
  padding:16px 52px;font-family:"Noto Serif Thai",serif;
  font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 32px rgba(200,144,26,0.5);
  transition:all 0.2s;white-space:nowrap;
  opacity:0;pointer-events:none;
}
#enter-tour-btn.show{opacity:1;pointer-events:all}
#enter-tour-btn:active{transform:translateX(-50%) scale(0.97)}

/* ===== TOUR 360 ===== */
#tour-screen{z-index:6}
#panorama{width:100%;height:100vh}
#tour-badge{
  position:absolute;top:16px;left:16px;z-index:20;
  background:rgba(10,5,0,0.80);border:1px solid #C8901A55;
  border-radius:14px;padding:10px 16px;backdrop-filter:blur(8px);
  pointer-events:none;
}
#tour-badge .tb-title{font-family:"Noto Serif Thai",serif;font-size:14px;font-weight:700;color:#E8B84B}
#tour-badge .tb-sub{font-size:11px;color:#C9A96E;margin-top:2px}
#back-btn{
  position:absolute;top:16px;right:16px;z-index:20;
  background:rgba(10,5,0,0.80);border:1px solid #C8901A55;
  border-radius:10px;padding:8px 14px;
  font-size:12px;color:#C9A96E;cursor:pointer;
  backdrop-filter:blur(8px);transition:all 0.2s;
}
#back-btn:active{transform:scale(0.96)}

/* animations */
@keyframes breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes float-up{0%{opacity:0;transform:translateY(0)}20%{opacity:.4}100%{opacity:0;transform:translateY(-120px)}}
.p{position:absolute;width:2px;height:2px;border-radius:50%;background:#C8901A;opacity:0;animation:float-up var(--dur) ease-in infinite var(--delay);left:var(--x);bottom:0}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="screen" id="splash">
  <canvas id="splashCanvas"></canvas>
  <div class="spl-bg"></div>
  <div id="particles"></div>
  <div class="spl-logo-wrap">
    <div class="spl-glow1"></div>
    <div class="spl-glow2"></div>
    <img class="spl-logo" src="logo_hiso.png" alt="โลโก้" onerror="this.style.display='none'">
  </div>
  <div class="spl-title">ศาลเจ้าปึงเถ่ากงม่า<br>ขอนแก่น</div>
  <div class="spl-sub">สมาคมปึงเถ่ากงม่าขอนแก่น</div>
  <div class="spl-divider"><span>❖</span></div>
  <button class="spl-btn" onclick="startFlyIn()">✦ เริ่มต้นการเดินทาง ✦</button>
</div>

<!-- MAP SCREEN -->
<div class="screen hidden" id="map-screen">
  <div id="map"></div>
  <div id="map-badge">
    <div class="mb-title">ศาลเจ้าปึงเถ่ากงม่าขอนแก่น</div>
    <div class="mb-sub">📍 ถนนรอบบึง ขอนแก่น</div>
  </div>
  <button id="enter-tour-btn" onclick="startTour()">🏮 เข้าชม Virtual Tour 360°</button>
</div>

<!-- TOUR SCREEN -->
<div class="screen hidden" id="tour-screen">
  <div id="panorama"></div>
  <div id="tour-badge">
    <div class="tb-title">ศาลเจ้าปึงเถ่ากงม่าขอนแก่น</div>
    <div class="tb-sub">🏮 ลากนิ้วเพื่อสำรวจ 360°</div>
  </div>
  <button id="back-btn" onclick="backToMap()">← แผนที่</button>
</div>

<script>
const SHRINE_LNG = 102.840091;
const SHRINE_LAT = 16.419801;
mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw';

let map, viewer;

// === SPLASH PARTICLES ===
const pc = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p=document.createElement('div');p.className='p';
  p.style.setProperty('--x',Math.random()*100+'%');
  p.style.setProperty('--dur',(5+Math.random()*6)+'s');
  p.style.setProperty('--delay',(Math.random()*8)+'s');
  pc.appendChild(p);
}

// splash canvas
(function(){
  const canvas=document.getElementById('splashCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<40;i++)pts.push({x:Math.random()*800,y:Math.random()*900,r:Math.random()*1.2+0.3,vx:(Math.random()-0.5)*0.3,vy:-Math.random()*0.5-0.1,a:Math.random(),da:Math.random()*0.01+0.003});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.a+=p.da;
      if(p.a>1||p.a<0)p.da*=-1;
      if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,144,26,${p.a*0.6})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// === FLY IN ===
function startFlyIn(){
  // ซ่อน splash
  document.getElementById('splash').classList.add('hidden');

  // แสดง map screen
  const ms = document.getElementById('map-screen');
  ms.classList.remove('hidden');

  // init map ถ้ายังไม่ได้ทำ
  if(!map){
    map = new mapboxgl.Map({
      container:'map',
      style:'mapbox://styles/mapbox/satellite-v9',
      center:[SHRINE_LNG, SHRINE_LAT],
      zoom:3,pitch:0,bearing:0,antialias:true
    });
    map.on('load', doFlyIn);
  } else {
    doFlyIn();
  }
}

function doFlyIn(){
  // step 1: zoom จากไกล
  setTimeout(()=>{
    map.flyTo({center:[SHRINE_LNG,SHRINE_LAT],zoom:8,pitch:30,bearing:0,duration:2500,essential:true});
  },300);

  // step 2: เข้าใกล้ขึ้น
  setTimeout(()=>{
    map.flyTo({center:[SHRINE_LNG,SHRINE_LAT],zoom:14,pitch:55,bearing:-20,duration:3000,essential:true});
  },3000);

  // step 3: ร่อนลงมาใกล้สุด
  setTimeout(()=>{
    map.flyTo({center:[SHRINE_LNG,SHRINE_LAT],zoom:18,pitch:65,bearing:15,duration:3500,essential:true});
  },6200);

  // แสดง badge และปุ่ม
  setTimeout(()=>{
    document.getElementById('map-badge').classList.add('show');
    // marker
    const el=document.createElement('div');
    el.innerHTML='🏮';
    el.style.cssText='font-size:28px;cursor:pointer;animation:pulse-m 2s ease-in-out infinite;';
    document.head.insertAdjacentHTML('beforeend','<style>@keyframes pulse-m{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}</style>');
    new mapboxgl.Marker(el).setLngLat([SHRINE_LNG,SHRINE_LAT]).addTo(map);
    setTimeout(()=>{
      document.getElementById('enter-tour-btn').classList.add('show');
    },800);
  },10000);
}

// === START TOUR ===
function startTour(){
  document.getElementById('map-screen').classList.add('hidden');
  const ts = document.getElementById('tour-screen');
  ts.classList.remove('hidden');

  if(!viewer){
    viewer = pannellum.viewer('panorama',{
      type:'equirectangular',
      panorama:'tour_360.jpg',
      autoLoad:true,
      autoRotate:-2,
      autoRotateInactivityDelay:3000,
      compass:false,
      showZoomCtrl:true,
      showFullscreenCtrl:true,
      hfov:100,
      maxHfov:120,
      minHfov:50,
      haov:360,
      vaov:130,
      vOffset:0,
      strings:{
        loadButtonLabel:"คลิกเพื่อเริ่มชม",
        loadingLabel:"กำลังโหลด...",
      }
    });
  }
}

// === BACK TO MAP ===
function backToMap(){
  document.getElementById('tour-screen').classList.add('hidden');
  document.getElementById('map-screen').classList.remove('hidden');
}
</script>
</body>
</html>
